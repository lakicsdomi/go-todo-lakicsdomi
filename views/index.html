<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Todo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        /* Custom styling for strike-through text */
        .completed-task {
            text-decoration: line-through;
            color: #6c757d;
        }
    </style>
</head>
<body class="bg-body-tertiary">
    <div class="container my-5" style="max-width: 800px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-primary"><i class="bi bi-check2-square"></i> Go Todos</h1>
            <button class="btn btn-outline-secondary d-flex align-items-center gap-2" id="themeToggle">
                <i class="bi bi-moon-fill" id="themeIcon"></i>
                <span id="themeText">Dark Mode</span>
            </button>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form action="/add" method="post" class="d-flex gap-2">
                    <input type="text" class="form-control form-control-lg" name="item" placeholder="What do you want to do?" required>
                    <button type="submit" class="btn btn-primary btn-lg px-4">Add</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-body border-bottom-0 pt-3 pb-0">
                <h5 class="mb-0">Your Tasks</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-borderless mb-0 align-middle">
                        <thead class="border-bottom">
                            <tr>
                                <th scope="col" class="ps-4 py-3">Task</th>
                                <th scope="col" class="py-3">Status</th>
                                <th scope="col" class="text-end pe-4 py-3">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {{range .Todos}}
                                {{if .Completed}}
                                    <tr>
                                        <td class="ps-4 completed-task">{{.Item}}</td>
                                        <td><span class="badge text-bg-success">Completed</span></td>
                                        <td class="text-end pe-4">
                                            <button class="btn btn-sm btn-outline-secondary disabled"><i class="bi bi-check-lg"></i> Complete</button>
                                            <a href="/delete/{{.Id}}" class="btn btn-sm btn-danger"><i class="bi bi-trash3"></i> Delete</a>
                                        </td>
                                    </tr>
                                {{else}}
                                    <tr>
                                        <td class="ps-4 fw-medium">{{.Item}}</td>
                                        <td><span class="badge text-bg-warning">Pending</span></td>
                                        <td class="text-end pe-4">
                                            <a href="/complete/{{.Id}}" class="btn btn-sm btn-success"><i class="bi bi-check-lg"></i> Complete</a>
                                            <a href="/delete/{{.Id}}" class="btn btn-sm btn-danger"><i class="bi bi-trash3"></i> Delete</a>
                                        </td>
                                    </tr>
                                {{end}}
                            {{end}}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const toggleBtn = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        // Check local storage for saved theme preference
        const savedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(savedTheme);

        // Toggle theme on button click
        toggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // Function to update DOM elements based on active theme
        function applyTheme(theme) {
            htmlElement.setAttribute('data-bs-theme', theme);
            if (theme === 'dark') {
                themeIcon.className = 'bi bi-sun-fill text-warning';
                themeText.textContent = 'Light Mode';
            } else {
                themeIcon.className = 'bi bi-moon-fill';
                themeText.textContent = 'Dark Mode';
            }
        }
    </script>
</body>
</html>
